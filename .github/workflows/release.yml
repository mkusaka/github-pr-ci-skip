name: Release
on:
  push:
    tags:
      - "v*"
permissions:
  contents: write
jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0
          persist-credentials: false
      - name: Setup pnpm
        uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6.0.9

      - name: Setup Node.js
        uses: actions/setup-node@249970729cb0ef3589644e2896645e5dc5ba9c38 # v6.5.0
        with:
          node-version: "24.18.0"
          package-manager-cache: false
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
      - name: Build and package extension
        run: pnpm package
      - name: Get version from manifest.json
        id: version
        run: |
          VERSION=$(jq -r '.version' dist/manifest.json)
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "Version: ${VERSION}"
      - name: Create release package
        run: |
          # Rename the package.zip created by pnpm package
          mv package.zip github-pr-ci-skip-v${{ steps.version.outputs.version }}.zip

          # Create a source code archive
          zip -r github-pr-ci-skip-source-v${{ steps.version.outputs.version }}.zip . \
            -x "*.git*" \
            -x "*node_modules*" \
            -x "*release-package*" \
            -x "*.zip"
      - name: Generate release notes
        id: release_notes
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_TAG: ${{ github.ref_name }}
          RELEASE_TARGET: ${{ github.sha }}
          REPOSITORY: ${{ github.repository }}
        run: |
          # Get the previous tag
          PREVIOUS_TAG=$(git describe --tags --abbrev=0 HEAD^ 2>/dev/null || echo "")

          if [ -z "$PREVIOUS_TAG" ]; then
            echo "No previous tag found, generating notes from beginning"
            NOTES=$(gh api \
              --method POST \
              -H "Accept: application/vnd.github+json" \
              -H "X-GitHub-Api-Version: 2022-11-28" \
              "/repos/${REPOSITORY}/releases/generate-notes" \
              -f tag_name="$RELEASE_TAG" \
              -f target_commitish="$RELEASE_TARGET" | jq -r '.body')
          else
            echo "Generating notes from ${PREVIOUS_TAG} to ${RELEASE_TAG}"
            NOTES=$(gh api \
              --method POST \
              -H "Accept: application/vnd.github+json" \
              -H "X-GitHub-Api-Version: 2022-11-28" \
              "/repos/${REPOSITORY}/releases/generate-notes" \
              -f tag_name="$RELEASE_TAG" \
              -f target_commitish="$RELEASE_TARGET" \
              -f previous_tag_name="${PREVIOUS_TAG}" | jq -r '.body')
          fi

          # Save notes to file for the release
          echo "${NOTES}" > release_notes.md
          echo "Release notes generated successfully"
      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_TAG: ${{ github.ref_name }}
          RELEASE_VERSION: ${{ steps.version.outputs.version }}
        run: |
          gh release create "$RELEASE_TAG" \
            --title "Release $RELEASE_TAG" \
            --notes-file release_notes.md \
            "github-pr-ci-skip-v${RELEASE_VERSION}.zip" \
            "github-pr-ci-skip-source-v${RELEASE_VERSION}.zip"
      - name: Upload Release Assets Summary
        env:
          RELEASE_TAG: ${{ github.ref_name }}
          RELEASE_VERSION: ${{ steps.version.outputs.version }}
        run: |
          {
            echo "### Release Created Successfully!"
            echo ""
            echo "**Version:** v${RELEASE_VERSION}"
            echo "**Tag:** ${RELEASE_TAG}"
            echo ""
            echo "**Assets:**"
            echo "- \`github-pr-ci-skip-v${RELEASE_VERSION}.zip\` - Chrome Extension package"
            echo "- \`github-pr-ci-skip-source-v${RELEASE_VERSION}.zip\` - Source code"
          } >> "$GITHUB_STEP_SUMMARY"
    permissions:
      contents: write
    timeout-minutes: 90
